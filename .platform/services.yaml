version: 1
layout: multi
services:
  - name: api
    path: backend
    build_mode: dockerfile
    ingress: /api
    health: /health
  - name: web
    path: frontend
    build_mode: dockerfile
    ingress: /
    health: /
  - name: node
    path: backend-node
    build_mode: buildpack
    stack: node
    expose: false
    health: /health
  - name: dotnet
    path: backend-dotnet
    build_mode: dockerfile
    dockerfile: backend-dotnet/Dockerfile
    expose: false
    health: /health
  - name: worker
    path: worker
    build_mode: buildpack
    stack: python
    expose: false
    health: /health
