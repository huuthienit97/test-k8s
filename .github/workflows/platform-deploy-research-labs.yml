name: Build and push (research-labs)

on:
  push:
    branches: [multi-submodules]
  workflow_dispatch:

env:
  API_IMAGE: harbor.161-97-176-55.sslip.io/research-labs/api:latest
  WEB_IMAGE: harbor.161-97-176-55.sslip.io/research-labs/web:latest
  NODE_IMAGE: harbor.161-97-176-55.sslip.io/research-labs/node:latest
  DOTNET_IMAGE: harbor.161-97-176-55.sslip.io/research-labs/dotnet:latest
  WORKER_IMAGE: harbor.161-97-176-55.sslip.io/research-labs/worker:latest

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Kiểm tra cấu hình env (Platform)
        run: |
          curl -fsS -X POST "https://platform.7mlabs.com/api/v1/hooks/deploy/validate-config" \
            -H "Content-Type: application/json" \
            -H "X-Platform-Deploy-Token: ${{ secrets.PLATFORM_DEPLOY_TOKEN_RESEARCH_LABS }}" \
            -d '{"environment":"dev"}'

      - name: Notify platform (build started)
        continue-on-error: true
        run: |
          curl -fsS -X POST "https://platform.7mlabs.com/api/v1/hooks/deploy/event" \
            -H "Content-Type: application/json" \
            -H "X-Platform-Deploy-Token: ${{ secrets.PLATFORM_DEPLOY_TOKEN_RESEARCH_LABS }}" \
            -d '{"event":"build_started","image_tag":"'"${{ github.sha }}"'","environment":"dev"}'

      - name: Login Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.161-97-176-55.sslip.io
          username: ${{ secrets.HARBOR_USERNAME_RESEARCH_LABS }}
          password: ${{ secrets.HARBOR_PASSWORD_RESEARCH_LABS }}

      - name: Setup pack (Buildpack)
        uses: buildpacks/github-actions/setup-pack@v5.12.5

      - name: Build and push Api
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            harbor.161-97-176-55.sslip.io/research-labs/api:latest
            harbor.161-97-176-55.sslip.io/research-labs/api:${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_REF=${{ github.ref_name }}
            BUILD_LABEL=${{ secrets.BUILD_RESEARCH_LABS_BUILD_LABEL }}
            VITE_API_BASE=/api

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            harbor.161-97-176-55.sslip.io/research-labs/web:latest
            harbor.161-97-176-55.sslip.io/research-labs/web:${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_REF=${{ github.ref_name }}
            BUILD_LABEL=${{ secrets.BUILD_RESEARCH_LABS_BUILD_LABEL }}
            VITE_API_BASE=/api

      - name: Build and push Node
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend-node/Dockerfile
          push: true
          tags: |
            harbor.161-97-176-55.sslip.io/research-labs/node:latest
            harbor.161-97-176-55.sslip.io/research-labs/node:${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_REF=${{ github.ref_name }}
            BUILD_LABEL=${{ secrets.BUILD_RESEARCH_LABS_BUILD_LABEL }}

      - name: Build and push Dotnet
        uses: docker/build-push-action@v6
        with:
          context: backend-dotnet
          file: backend-dotnet/Dockerfile
          push: true
          tags: |
            harbor.161-97-176-55.sslip.io/research-labs/dotnet:latest
            harbor.161-97-176-55.sslip.io/research-labs/dotnet:${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_REF=${{ github.ref_name }}
            BUILD_LABEL=${{ secrets.BUILD_RESEARCH_LABS_BUILD_LABEL }}
            VITE_API_BASE=/api

      - name: Build and push Worker
        run: |
          pack build "harbor.161-97-176-55.sslip.io/research-labs/worker:latest" \
            --path "worker" \
            --builder paketobuildpacks/builder-jammy-base \
            --publish \
            --tag "harbor.161-97-176-55.sslip.io/research-labs/worker:${{ github.sha }}" \
            --env "GIT_SHA=${{ github.sha }}" \
            --env "GIT_REF=${{ github.ref_name }}" \
            --env "PORT=8080" \
            --env "BP_CPYTHON_VERSION=3.11" \
            --env "BUILD_LABEL=${{ secrets.BUILD_RESEARCH_LABS_BUILD_LABEL }}" \
            --env "VITE_API_BASE=/api"

      - name: Deploy to Platform
        run: |
          curl -fsS -X POST "https://platform.7mlabs.com/api/v1/hooks/deploy" \
            -H "Content-Type: application/json" \
            -H "X-Platform-Deploy-Token: ${{ secrets.PLATFORM_DEPLOY_TOKEN_RESEARCH_LABS }}" \
            -d '{"image_tag":"'"${{ github.sha }}"'","environment":"dev"}'
