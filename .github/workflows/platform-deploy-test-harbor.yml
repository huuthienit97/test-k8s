name: Build and push (test-harbor)

on:
  push:
    branches: [multi-submodules]
  workflow_dispatch:

env:
  API_IMAGE: harbor.161-97-176-55.sslip.io/test-harbor/api:latest
  WEB_IMAGE: harbor.161-97-176-55.sslip.io/test-harbor/web:latest

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Kiểm tra cấu hình env (Platform)
        run: |
          CODE=$(curl -sS -o /tmp/platform-validate.json -w '%{http_code}' -X POST "https://platform.7mlabs.com/api/v1/hooks/deploy/validate-config" \
            -H "Content-Type: application/json" \
            -H "X-Platform-Deploy-Token: ${{ secrets.PLATFORM_DEPLOY_TOKEN_TEST_HARBOR }}" \
            -d '{"environment":"dev"}')
          if [ "$CODE" != "200" ]; then
            echo "Platform validate-config HTTP $CODE:"
            cat /tmp/platform-validate.json
            exit 22
          fi

      - name: Notify platform (build started)
        continue-on-error: true
        run: |
          curl -fsS -X POST "https://platform.7mlabs.com/api/v1/hooks/deploy/event" \
            -H "Content-Type: application/json" \
            -H "X-Platform-Deploy-Token: ${{ secrets.PLATFORM_DEPLOY_TOKEN_TEST_HARBOR }}" \
            -d '{"event":"build_started","image_tag":"'"${{ github.sha }}"'","environment":"dev"}'

      - name: Login Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.161-97-176-55.sslip.io
          username: ${{ secrets.HARBOR_USERNAME_TEST_HARBOR }}
          password: ${{ secrets.HARBOR_PASSWORD_TEST_HARBOR }}

      - name: Build and push Api
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            harbor.161-97-176-55.sslip.io/test-harbor/api:latest
            harbor.161-97-176-55.sslip.io/test-harbor/api:${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_REF=${{ github.ref_name }}
            BUILD_LABEL=test-harbor
            VITE_API_BASE=/api

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            harbor.161-97-176-55.sslip.io/test-harbor/web:latest
            harbor.161-97-176-55.sslip.io/test-harbor/web:${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_REF=${{ github.ref_name }}
            BUILD_LABEL=test-harbor
            VITE_API_BASE=/api

      - name: Deploy to Platform
        run: |
          curl -fsS -X POST "https://platform.7mlabs.com/api/v1/hooks/deploy" \
            -H "Content-Type: application/json" \
            -H "X-Platform-Deploy-Token: ${{ secrets.PLATFORM_DEPLOY_TOKEN_TEST_HARBOR }}" \
            -d '{"image_tag":"'"${{ github.sha }}"'","environment":"dev"}'
